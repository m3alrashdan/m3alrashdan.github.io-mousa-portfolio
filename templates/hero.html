<section id="hero">
  <div class="hero-left">
    <p class="hero-eyebrow">{tagline}</p>
    <h1 class="hero-name">{name_parts[0]}<br><em>{name_parts[1]}</em><br>{name_parts[2]}</h1>
    <p class="hero-subtitle">{title}</p>
    <p class="hero-desc">{about_short}</p>
    <div class="hero-btns">
      <a class="btn btn-primary" href="#projects">View Projects</a>
      <a class="btn btn-outline" href="#contact">Contact Me</a>
    </div>
    <div class="hero-stats">{stats}</div>
  </div>
  <div class="hero-right">
    <div class="avatar-wrap">
      <img src="{photo}" alt="{name}" onerror="this.style.display='none';" />
      <div class="avatar-fallback">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="22" r="12" stroke="#2a2620" stroke-width="1.5"/>
          <path d="M6 58c0-14.359 11.641-26 26-26s26 11.641 26 26" stroke="#2a2620" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>profile.jpg</p>
      </div>
      <p class="avatar-deco">AI · ML · DATA</p>
    </div>
  </div>
</section>
