<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{name} | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#faf8f4; --bg2:#f4f1eb; --surface:#eeeae0; --border:#e0dbd0;
      --accent:#b5893a; --accent2:#7a6a4f;
      --text:#2a2620; --text-mid:#6b6358; --text-dim:#a09a90; --white:#ffffff;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:20px 64px;background:rgba(250,248,244,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--text);text-decoration:none;}
    .nav-logo span{color:var(--accent);}
    nav ul{list-style:none;display:flex;gap:40px;}
    nav ul a{font-size:13px;color:var(--text-mid);text-decoration:none;letter-spacing:.5px;transition:color .2s;}
    nav ul a:hover{color:var(--accent);}
    #hero{min-height:100vh;display:flex;align-items:center;padding:120px 64px 80px;max-width:1200px;margin:0 auto;gap:80px;}
    .hero-left{flex:1;}
    .hero-eyebrow{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:24px;opacity:0;animation:fadeUp .6s .1s forwards;}
    .hero-name{font-family:'DM Serif Display',serif;font-size:clamp(40px,5.5vw,72px);line-height:1.08;color:var(--text);opacity:0;animation:fadeUp .7s .25s forwards;}
    .hero-name em{font-style:normal;color:var(--accent);}
    .hero-subtitle{font-size:14px;color:var(--text-mid);letter-spacing:2px;text-transform:uppercase;margin:20px 0 32px;opacity:0;animation:fadeUp .7s .4s forwards;}
    .hero-desc{font-size:16px;line-height:1.85;color:var(--text-mid);max-width:520px;border-left:2px solid var(--accent);padding-left:20px;opacity:0;animation:fadeUp .7s .55s forwards;}
    .hero-btns{display:flex;gap:14px;margin-top:40px;opacity:0;animation:fadeUp .7s .7s forwards;}
    .btn{font-size:13px;letter-spacing:1px;padding:13px 28px;text-decoration:none;transition:all .25s;border-radius:2px;}
    .btn-primary{background:var(--text);color:var(--bg);}
    .btn-primary:hover{background:var(--accent);}
    .btn-outline{background:transparent;color:var(--text);border:1px solid var(--border);}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
    .hero-stats{display:flex;gap:40px;margin-top:56px;padding-top:40px;border-top:1px solid var(--border);opacity:0;animation:fadeUp .7s .85s forwards;}
    .stat-num{font-family:'DM Serif Display',serif;font-size:32px;color:var(--text);display:block;}
    .stat-label{font-size:12px;color:var(--text-dim);letter-spacing:1px;margin-top:2px;}
    .hero-right{flex-shrink:0;opacity:0;animation:fadeIn 1s .3s forwards;}
    .avatar-wrap{width:320px;height:380px;background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden;}
    .avatar-wrap img{width:100%;height:100%;object-fit:cover;display:none;}
    .avatar-fallback{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
    .avatar-fallback svg{opacity:.2;}
    .avatar-fallback p{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:2px;}
    .avatar-deco{position:absolute;bottom:20px;right:20px;font-family:'DM Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;opacity:.6;}
    section{position:relative;}
    .section-wrap{max-width:1100px;margin:0 auto;padding:96px 64px;}
    .section-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
    .section-title{font-family:'DM Serif Display',serif;font-size:36px;color:var(--text);margin-bottom:56px;}
    #about{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
    .about-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:64px;align-items:start;}
    .about-text p{font-size:16px;line-height:1.9;color:var(--text-mid);margin-bottom:18px;}
    .info-list{display:flex;flex-direction:column;}
    .info-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border);}
    .info-row:first-child{border-top:1px solid var(--border);}
    .info-key{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;}
    .info-val{font-size:14px;font-weight:500;color:var(--text);text-align:right;}
    #skills{background:var(--bg);}
    .skills-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:48px;}
    .skill-group-name{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border);}
    .skill-tags{display:flex;flex-wrap:wrap;gap:8px;}
    .skill-tag{font-size:13px;padding:6px 14px;background:var(--bg2);border:1px solid var(--border);color:var(--text-mid);border-radius:2px;transition:border-color .2s,color .2s;}
    .skill-tag:hover{border-color:var(--accent);color:var(--accent);}
    #projects{background:var(--bg2);border-top:1px solid var(--border);}
    .proj-category{margin-bottom:56px;}
    .proj-category-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
    .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);}
    .proj-card{background:var(--bg);padding:28px;transition:background .2s;}
    .proj-card:hover{background:var(--white);}
    .proj-card.coming-soon{opacity:.45;}
    .proj-name{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);margin-bottom:10px;line-height:1.3;}
    .proj-desc{font-size:14px;line-height:1.75;color:var(--text-mid);margin-bottom:18px;}
    .proj-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
    .proj-tag{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;background:var(--surface);color:var(--text-mid);letter-spacing:.5px;}
    .proj-link{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);text-decoration:none;letter-spacing:1px;transition:opacity .2s;}
    .proj-link:hover{opacity:.7;}
    .proj-link::after{content:' →';}
    .coming-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:2px;}
    #contact{background:var(--bg);border-top:1px solid var(--border);}
    .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;}
    .contact-intro{font-size:16px;line-height:1.85;color:var(--text-mid);margin-bottom:36px;}
    .contact-links{display:flex;flex-direction:column;}
    .contact-link{display:flex;align-items:center;gap:16px;padding:18px 0;border-bottom:1px solid var(--border);text-decoration:none;transition:color .2s;}
    .contact-link:first-child{border-top:1px solid var(--border);}
    .contact-link:hover .contact-link-value{color:var(--accent);}
    .contact-link-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;width:60px;}
    .contact-link-value{font-size:14px;font-weight:500;color:var(--text);}
    .contact-note{background:var(--bg2);border:1px solid var(--border);padding:32px;}
    .contact-note-title{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);margin-bottom:16px;}
    .contact-note-body{font-size:14px;line-height:1.85;color:var(--text-mid);}
    .contact-note-body p{margin-bottom:10px;}
    .contact-note-body p:last-child{margin-bottom:0;}
    .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:10px;vertical-align:middle;}
    footer{text-align:center;padding:32px 64px;border-top:1px solid var(--border);font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;}
    footer span{color:var(--accent);}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    .reveal{opacity:0;transform:translateY(20px);transition:opacity .7s,transform .7s;}
    .reveal.visible{opacity:1;transform:translateY(0);}
    @media(max-width:900px){
      nav{padding:16px 24px;} nav ul{gap:24px;}
      #hero{flex-direction:column-reverse;padding:100px 24px 60px;gap:40px;}
      .hero-right{display:none;}
      .section-wrap{padding:64px 24px;}
      .about-grid,.skills-grid,.contact-grid{grid-template-columns:1fr;}
    }
  
#training{background:var(--bg);border-top:1px solid var(--border);}
.training-list{display:flex;flex-direction:column;gap:1px;background:var(--border);border:1px solid var(--border);}
.training-card{background:var(--bg);padding:28px;transition:background .2s;}
.training-card:hover{background:var(--white);}
.training-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;gap:16px;}
.training-title{font-family:'DM Serif Display',serif;font-size:17px;color:var(--text);margin-bottom:4px;}
.training-issuer{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:1px;}
.training-year{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:1px;flex-shrink:0;}
.training-desc{font-size:14px;line-height:1.75;color:var(--text-mid);}
.training-badge{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 8px;background:var(--surface);border:1px solid var(--accent);color:var(--accent);margin-left:10px;vertical-align:middle;}
.training-link{display:inline-block;margin-top:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;text-decoration:none;border-bottom:1px solid var(--border);padding-bottom:1px;transition:color .2s,border-color .2s;}
.training-link:hover{color:var(--accent);border-color:var(--accent);}
.training-card-link{text-decoration:none;color:inherit;display:block;}
.training-card-link .training-card{cursor:pointer;}
.training-card-link:hover .training-card{background:var(--white);}
.training-card-link:hover .training-title{color:var(--accent);}
</style>
</head>
<body>
<nav>
  <a class="nav-logo" href="#hero">Mousa<span>.</span></a>
  <ul>
    <li><a href="#about">About</a></li>
    <li><a href="#skills">Skills</a></li>
    <li><a href="#projects">Projects</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</nav>
{content}
<footer>
  <p>© 2025 <span>{name}</span> — All rights reserved</p>
</footer>
<script>
  const reveals=document.querySelectorAll('.reveal');
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible');});},{threshold:.1});
  reveals.forEach(r=>obs.observe(r));
</script>
</body>
</html>
